name: PR Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch
concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      # Advisory: run `npm run prettier` locally once to normalize formatting.
      # Non-blocking so generated metadata doesn't fail the gate before the first
      # formatting pass.
      - name: Prettier check
        continue-on-error: true
        run: npm run prettier:verify

      - name: LWC Jest tests
        run: npm run test:unit:coverage

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate Dev Hub
        env:
          DEVHUB_SFDX_URL: ${{ secrets.DEVHUB_SFDX_URL }}
        run: |
          if [ -z "$DEVHUB_SFDX_URL" ]; then
            echo "::error::Missing DEVHUB_SFDX_URL secret. Add it in repo Settings > Secrets > Actions."
            exit 1
          fi
          printf '%s' "$DEVHUB_SFDX_URL" > ./devhub-auth.txt
          sf org login sfdx-url --sfdx-url-file ./devhub-auth.txt --set-default-dev-hub --alias devhub
          rm -f ./devhub-auth.txt

      - name: Create scratch org
        run: sf org create scratch --definition-file config/project-scratch-def.json --alias ci --set-default --duration-days 1 --wait 10

      - name: Deploy source
        run: sf project deploy start --target-org ci --wait 30

      - name: Assign permission set
        run: sf org assign permset --name Humanitix_Integration_Admin --target-org ci

      - name: Run Apex tests (RunLocalTests, coverage gate)
        run: |
          sf apex run test --target-org ci --code-coverage --result-format human \
            --wait 30 --test-level RunLocalTests --output-dir ./test-results

      - name: Delete scratch org
        if: always()
        run: sf org delete scratch --target-org ci --no-prompt || true
